syntax = "proto3";

package fixapp;

service AuthService {
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc Signup(SignupRequest) returns (AuthResponse);
  rpc RefreshToken(RefreshRequest) returns (AuthResponse);
  rpc Logout(LogoutRequest) returns (Empty);
}

service RcaService {
  rpc FindAll(FindAllRcasRequest) returns (RcaList);
  rpc FindById(FindByIdRequest) returns (Rca);
  rpc Create(CreateRcaRequest) returns (Rca);
}

// Auth Messages
message LoginRequest {
  string email = 1;
  string password = 2;
}

message SignupRequest {
  string email = 1;
  string password = 2;
  string name = 3;
  string tenant_name = 4;
  string subdomain = 5;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string access_token = 1;
}

message Empty {}

// RCA Messages
message FindAllRcasRequest {
  string tenant_id = 1;
  int32 limit = 2;
}

message FindByIdRequest {
  string id = 1;
  string tenant_id = 2;
}

message CreateRcaRequest {
  string tenant_id = 1;
  string user_id = 2;
  string title = 3;
  string description = 4;
  optional string equipment_name = 5;
  optional string maintenance_ticket_id = 6;
}

message RcaList {
  repeated Rca rcas = 1;
}

message Rca {
  string id = 1;
  string rca_number = 2;
  string title = 3;
  string description = 4;
  string status = 5;
  string tenant_id = 6;
  string created_by_id = 7;
  string created_at = 8;
  string updated_at = 9;
}
